<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игры</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="games-hub page-shell">
        <header class="hub-header">
            <p class="hub-category">Строительная техника</p>
            <h1 class="theme-title">Выбери игру</h1>
        </header>

        <section class="games-grid" aria-label="Список игр">
            <a class="game-card theme-panel" href="equipment_info_game/index.html">
                <span class="game-preview game-preview-info" aria-hidden="true">
                    <span class="preview-info-sheet">
                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>
                    </span>
                    <img class="preview-image preview-image-info" src="data/images/самосвал.png" alt="">
                </span>
                <span class="game-info">
                    <span class="game-title game-title-info">Знакомство<br><span class="game-title-nowrap">с техникой</span></span>
                    <span class="game-action theme-button">
                        Играть
                    </span>
                </span>
            </a>
            <a class="game-card theme-panel" href="shadows_game/index.html">
                <span class="game-preview" aria-hidden="true">
                    <img class="preview-image" src="data/images/фронтальный_погрузчик.png" alt="">
                    <img class="preview-shadow" src="data/shadows/фронтальный_погрузчик.png" alt="">
                </span>
                <span class="game-info">
                    <span class="game-title">Угадываем тени</span>
                    <span class="game-action theme-button">
                        Играть
                    </span>
                </span>
            </a>
            <a class="game-card theme-panel" href="puzzle_game/index.html">
                <span class="game-preview game-preview-puzzle" aria-hidden="true">
                    <img class="preview-image preview-image-puzzle" src="data/images/башенный_кран.png" alt="">
                    <span class="preview-cut"></span>
                </span>
                <span class="game-info">
                    <span class="game-title">Собери пазл</span>
                    <span class="game-action theme-button">
                        Играть
                    </span>
                </span>
            </a>
            <a class="game-card theme-panel" href="look_at_rows_game/index.html">
                <span class="game-preview game-preview-rows" aria-hidden="true">
                    <span class="preview-pattern-stage">
                        <span class="preview-pattern-row">
                            <img src="data/images/экскаватор.png" alt="">
                            <img src="data/images/фронтальный_погрузчик.png" alt="">
                            <img src="data/images/экскаватор.png" alt="">
                            <img src="data/images/фронтальный_погрузчик.png" alt="">
                            <span class="preview-next-slot"></span>
                        </span>
                    </span>
                </span>
                <span class="game-info">
                    <span class="game-title">Продолжи ряд</span>
                    <span class="game-action theme-button">
                        Играть
                    </span>
                </span>
            </a>
            <a class="game-card theme-panel" href="count_puzzle_game/index.html">
                <span class="game-preview game-preview-count" aria-hidden="true">
                    <span class="preview-count-stage">
                        <img
                            class="preview-count-cover"
                            src="data/task_design/пазл_счет.png"
                            alt=""
                        >
                    </span>
                </span>
                <span class="game-info">
                    <span class="game-title">Пазл-счёт</span>
                    <span class="game-action theme-button">
                        Играть
                    </span>
                </span>
            </a>
        </section>
    </main>
    <script src="shared/game-sounds.js"></script>
    <script src="game-hub.js"></script>
</body>
</html>
