<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игры</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="games-hub">
        <header class="hub-header">
            <p class="eyebrow">Коллекция игр</p>
            <h1>Выбери игру</h1>
        </header>

        <section class="games-grid" aria-label="Список игр">
            <a class="game-card" href="shadows_game/index.html">
                <span class="game-preview" aria-hidden="true">
                    <img class="preview-image" src="data/images/1.PNG" alt="">
                    <img class="preview-shadow" src="data/shadows/1.png" alt="">
                </span>
                <span class="game-info">
                    <span class="game-kicker">Строительная техника</span>
                    <span class="game-title">Угадываем тени</span>
                    <span class="game-action">Играть</span>
                </span>
            </a>
        </section>
    </main>
</body>
</html>
