<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игры</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="games-hub page-shell">
        <header class="hub-header">
            <p class="hub-category">Строительная техника</p>
            <h1 class="theme-title">Выбери игру</h1>
        </header>

        <section class="games-grid" aria-label="Список игр">
            <a class="game-card theme-panel" href="shadows_game/index.html">
                <span class="game-preview" aria-hidden="true">
                    <img class="preview-image" src="data/images/фронтальный_погрузчик.png" alt="">
                    <img class="preview-shadow" src="data/shadows/фронтальный_погрузчик.png" alt="">
                </span>
                <span class="game-info">
                    <span class="game-title">Угадываем тени</span>
                    <span class="game-action theme-button">
                        Играть
                    </span>
                </span>
            </a>
        </section>
    </main>
</body>
</html>
