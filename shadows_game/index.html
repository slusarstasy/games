<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Угадываем тени</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="app">
        <header class="top-bar">
            <div class="title-group">
                <a class="back-link" href="../index.html">Все игры</a>
                <p class="eyebrow">Строительная техника</p>
                <h1>Угадываем тени</h1>
            </div>
            <div class="score" aria-live="polite">
                <span>Баллы:</span>
                <strong id="score">0</strong>
            </div>
        </header>

        <section class="status-panel" aria-live="polite">
            <p id="message">Выбери картинку и ее тень</p>
        </section>

        <section class="game-board" id="game-board" aria-label="Игровое поле">
            <svg class="connection-layer" id="connection-layer" aria-hidden="true"></svg>

            <div class="column" id="image-column" aria-label="Картинки техники"></div>
            <div class="column" id="shadow-column" aria-label="Тени техники"></div>
        </section>
    </main>

    <script src="game-animations.js"></script>
    <script src="game.js"></script>
</body>
</html>
