<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Угадываем тени</title>
    <link rel="stylesheet" href="../theme.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="app page-shell">
        <header class="top-bar">
            <div class="title-group">
                <a class="back-link theme-link" href="../index.html">
                    <span class="theme-icon" aria-hidden="true">
                        <svg viewBox="0 0 16 16" focusable="false">
                            <path d="M7.3 3 2.4 8l4.9 5 1.2-1.2L5.8 9H14V7H5.8l2.7-2.8L7.3 3Z"></path>
                        </svg>
                    </span>
                    Все игры
                </a>
                <h1 class="theme-title">Угадываем тени</h1>
            </div>
            <div class="score theme-surface" aria-live="polite">
                <span>Баллы:</span>
                <strong id="score">0</strong>
            </div>
        </header>

        <section class="status-panel" aria-live="polite">
            <p id="message">Выбери картинку и ее тень. Скажи, для чего нужна каждая машина</p>
        </section>

        <section class="game-board theme-panel" id="game-board" aria-label="Игровое поле">
            <svg class="connection-layer" id="connection-layer" aria-hidden="true"></svg>

            <div class="column" id="image-column" aria-label="Картинки техники"></div>
            <div class="column" id="shadow-column" aria-label="Тени техники"></div>
        </section>
    </main>

    <script src="game-animations.js"></script>
    <script src="game.js"></script>
</body>
</html>
