<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Собери пазл</title>
    <link rel="stylesheet" href="../theme.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="puzzle-app page-shell">
        <header class="top-bar">
            <div class="title-group">
                <a class="back-link theme-link" href="../index.html">
                    <span class="theme-icon" aria-hidden="true">
                        <svg viewBox="0 0 16 16" focusable="false">
                            <path d="M7.3 3 2.4 8l4.9 5 1.2-1.2L5.8 9H14V7H5.8l2.7-2.8L7.3 3Z"></path>
                        </svg>
                    </span>
                    Все игры
                </a>
                <h1 class="theme-title">Собери пазл</h1>
            </div>
            <div class="score theme-surface" aria-live="polite">
                <span>Баллы:</span>
                <strong id="score">0</strong>
            </div>
        </header>

        <section class="status-panel" aria-live="polite">
            <p id="message">Перетащи части в рамку. Клик по части поворачивает ее</p>
        </section>

        <section class="puzzle-board theme-panel" aria-label="Игровое поле">
            <div class="puzzle-progress">
                <span id="puzzle-title">Башенный кран</span>
                <strong id="puzzle-progress">1 из 6</strong>
            </div>

            <div class="puzzle-workspace">
                <div class="puzzle-target-wrap">
                    <div class="puzzle-target" id="puzzle-target" aria-label="Поле для пазла"></div>
                </div>
                <div class="pieces-tray" id="pieces-tray" aria-label="Части пазла"></div>
            </div>
        </section>
    </main>

    <script src="game.js"></script>
</body>
</html>
